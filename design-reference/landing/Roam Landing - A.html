<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roam · Landing Page — Direction A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; background: #f0eee9; font-family: "DM Sans", system-ui, sans-serif; }
    #root { width: 100vw; height: 100vh; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx?v=2"></script>
  <script type="text/babel" src="landing-shared.jsx?v=2"></script>
  <script type="text/babel" src="landing-screens.jsx?v=2"></script>
  <script type="text/babel" src="landing-a.jsx?v=2"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, DCPostIt, LandingADesktop, LandingAMobile } = window;

    const App = () => (
      <DesignCanvas>
        <DCSection
          id="dir-a"
          title="Roam · Landing — Direction A (master)"
          subtitle="Photo-led, near-single-screen gateway. Brainstorm → decide → go. Single CTA: Continue with Google (works for new + returning). Price kept quiet — disclosed at checkout.">
          <DCArtboard id="a-desktop" label="Desktop" width={1440} height={2114} data-screen-label="A · Desktop">
            <LandingADesktop />
          </DCArtboard>
          <DCArtboard id="a-mobile" label="Mobile" width={390} height={2752} data-screen-label="A · Mobile">
            <LandingAMobile />
          </DCArtboard>
        </DCSection>

        <DCPostIt left={56} top={-2} w={400} rotate={-1.5}>
          <strong>Direction A — the chosen front door</strong><br/><br/>
          One button does everything: <em>Continue with Google</em> signs up new visitors and logs in returning ones. The $10 is disclosed here and taken by Stripe <em>after</em> sign-in — this page never charges.<br/><br/>
          Three movements: <strong>Map</strong> (save onto it) · <strong>Plan</strong> (board) · <strong>Day</strong>.
        </DCPostIt>
      </DesignCanvas>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
